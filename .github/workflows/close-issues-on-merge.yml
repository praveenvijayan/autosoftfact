name: Close linked issues on PR merge

on:
  pull_request:
    types: [closed]

jobs:
  close-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close issues referenced in PR body
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const pattern = /(?:closes?|fixes?|resolves?)\s+#(\d+)/gi;
            const matches = [...body.matchAll(pattern)];

            if (matches.length === 0) {
              console.log('No issue references found in PR body.');
              return;
            }

            for (const match of matches) {
              const issueNumber = parseInt(match[1], 10);
              console.log(`Closing issue #${issueNumber} referenced in PR #${context.payload.pull_request.number}`);
              try {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  state: 'closed',
                  state_reason: 'completed',
                });
                console.log(`Successfully closed issue #${issueNumber}`);
              } catch (err) {
                console.error(`Failed to close issue #${issueNumber}: ${err.message}`);
              }
            }
